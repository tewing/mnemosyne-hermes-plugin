name: mnemosyne
version: "0.2.0"
description: |
  Thin loader for the official Mnemosyne Hermes plugin (github.com/AxDSan/Mnemosyne).

  The upstream repo has no root plugin.yaml and is built for
  `pip install mnemosyne-hermes`, so it can't be git-cloned into Hermes' plugins
  dir directly. This shim provides the root plugin.yaml + register(ctx) that the
  clone-and-discover loader needs, then on load:
    1. installs the official `mnemosyne-hermes` (+ mnemosyne-memory[embeddings])
       via `uv pip install --target $HERMES_HOME/pydeps` (the hermes venv is
       read-only and ships no pip);
    2. delegates to upstream `mnemosyne_hermes.register(ctx)` and, best-effort,
       `register_memory_provider(ctx)`.

requires_env: []
